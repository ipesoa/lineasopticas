      <style>:root{--paper:#f7f7f5;--ink:#2d2d2b}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink)}
body{font-family:Arial,Helvetica,sans-serif;padding:18px}
a{color:inherit}
.lo-shell{max-width:1120px;margin:0 auto}
.lo-header{display:flex;justify-content:space-between;align-items:baseline;
gap:20px;border-bottom:3px solid currentColor;padding:0 0 12px;margin-bottom:34px}
.lo-brand{font-size:clamp(24px,4vw,48px);font-weight:900;letter-spacing:-.055em;
text-decoration:none;text-transform:uppercase}
.lo-nav{display:flex;gap:14px;font-size:13px;font-weight:800;text-transform:uppercase}
.lo-article{max-width:790px;margin:0 auto}
.lo-kicker{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.lo-title{font-size:clamp(42px,8vw,88px);line-height:.88;letter-spacing:-.065em;
overflow-wrap:anywhere;text-transform:uppercase;margin:18px 0 38px}
.lo-copy{font-family:Arial,Helvetica,sans-serif;font-size:clamp(19px,2.2vw,25px);
line-height:1.42}
.lo-copy p{margin:0 0 1.25em}
.lo-share{display:flex;gap:10px;flex-wrap:wrap;border-top:2px solid currentColor;
margin-top:42px;padding-top:16px}
.lo-button{font:700 12px Arial,sans-serif;text-transform:uppercase;border:2px solid currentColor;
background:transparent;padding:9px 12px;cursor:pointer}
.lo-title-image{margin:28px 0 0;padding-top:20px;border-top:1px solid currentColor}
.lo-title-image img{display:block;width:min(224px,62vw);height:auto}
.lo-related{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:28px;
border-top:2px solid currentColor}
.lo-related a{padding:14px 14px 16px 0;border-bottom:1px solid currentColor;
font-weight:800;line-height:1.05;overflow-wrap:anywhere;text-decoration:none;text-transform:uppercase}
.lo-related a+a{padding-left:14px;border-left:1px solid currentColor}
.lo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.lo-card{border-top:3px solid currentColor;padding-top:12px}
.lo-card h2{font-size:clamp(25px,3vw,44px);line-height:.94;letter-spacing:-.045em;
overflow-wrap:anywhere;margin:0 0 12px;text-transform:uppercase}
.lo-card a{text-decoration:none}
.lo-meta{font-size:12px;font-weight:800;text-transform:uppercase}
@media(max-width:680px){body{padding:12px}.lo-header{display:block}.lo-nav{margin-top:10px}
.lo-title{font-size:clamp(38px,13vw,62px)}.lo-related{grid-template-columns:1fr}
.lo-related a,.lo-related a+a{padding:13px 0;border-left:0}}</style>
